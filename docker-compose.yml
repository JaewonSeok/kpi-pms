version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kpi-pms-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: kpi_pms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kpi_pms']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-local-data:
